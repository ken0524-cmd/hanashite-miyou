<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>はなしてみよう！ スタート</title>
<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
<style>
  :root {
    --sky:#e8f4fd; --yellow:#FFD93D; --orange:#FF6B6B;
    --green:#6BCB77; --blue:#4D96FF; --purple:#C77DFF;
    --pink:#FF9ECD; --dark:#3a3a5c; --shadow:rgba(77,150,255,.18);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Kosugi Maru', sans-serif;
    background: var(--sky);
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ===== 背景 ===== */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  /* 大きな丸いバブル */
  .blob {
    position: absolute;
    border-radius: 50%;
    opacity: .18;
    animation: blobFloat ease-in-out infinite;
  }
  .blob1 { width:420px; height:420px; background:var(--blue);   top:-120px; left:-100px; animation-duration:8s; }
  .blob2 { width:300px; height:300px; background:var(--yellow); bottom:-80px; right:-60px; animation-duration:10s; animation-delay:-3s; }
  .blob3 { width:220px; height:220px; background:var(--pink);   top:40%;  right:-60px; animation-duration:7s;  animation-delay:-5s; }
  .blob4 { width:180px; height:180px; background:var(--green);  bottom:15%; left:-40px; animation-duration:9s;  animation-delay:-1s; }
  @keyframes blobFloat {
    0%,100% { transform: translateY(0) scale(1); }
    50%      { transform: translateY(-30px) scale(1.05); }
  }

  /* 流れ星 */
  .star {
    position: absolute;
    border-radius: 50%;
    animation: starFloat linear infinite;
    opacity: 0;
  }
  @keyframes starFloat {
    0%   { transform: translateY(110vh) scale(0); opacity: 0; }
    10%  { opacity: .6; }
    90%  { opacity: .4; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* ===== メインカード ===== */
  .card {
    position: relative;
    z-index: 1;
    background: white;
    border-radius: 40px;
    padding: 2.8rem 2.4rem 2.4rem;
    max-width: 380px;
    width: 90%;
    box-shadow: 0 12px 0 #b8d4ee, 0 20px 60px rgba(77,150,255,.22);
    text-align: center;
    animation: cardPop .7s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes cardPop {
    from { transform: scale(.6) translateY(40px); opacity: 0; }
    to   { transform: scale(1)  translateY(0);    opacity: 1; }
  }

  /* デコレーション丸 */
  .card::before {
    content: '';
    position: absolute;
    top: -18px; right: -18px;
    width: 70px; height: 70px;
    background: var(--yellow);
    border-radius: 50%;
    box-shadow: 0 4px 0 #c9a800;
    z-index: -1;
    animation: decoBounce 2.5s ease-in-out infinite;
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: -14px; left: -14px;
    width: 50px; height: 50px;
    background: var(--pink);
    border-radius: 50%;
    box-shadow: 0 4px 0 #cc6ea0;
    z-index: -1;
    animation: decoBounce 3s ease-in-out infinite reverse;
  }
  @keyframes decoBounce {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-10px) rotate(15deg); }
  }

  /* ===== マスコット ===== */
  .mascot-area {
    margin-bottom: 1.2rem;
    position: relative;
    display: inline-block;
  }

  .mascot {
    width: 120px;
    height: 120px;
    position: relative;
    margin: 0 auto;
    animation: mascotBob 2.8s ease-in-out infinite;
  }
  @keyframes mascotBob {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-12px); }
  }

  .m-body {
    width: 100px; height: 100px;
    background: var(--yellow);
    border-radius: 50%;
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 7px 0 #d4ab00, 0 10px 30px rgba(255,217,61,.35);
  }
  .m-ears {
    position: absolute;
    top: 6px; left: 50%;
    transform: translateX(-50%);
    width: 100px;
  }
  .m-ear {
    position: absolute;
    width: 22px; height: 34px;
    background: var(--yellow);
    border-radius: 50% 50% 0 0;
    box-shadow: 0 -4px 0 #d4ab00;
  }
  .m-ear.l { left: 8px;  transform: rotate(-18deg); }
  .m-ear.r { right: 8px; transform: rotate(18deg); }

  .m-eye {
    position: absolute;
    background: var(--dark);
    border-radius: 50%;
    width: 13px; height: 15px;
    top: 30px;
  }
  .m-eye.l { left: 22px; }
  .m-eye.r { right: 22px; }
  .m-shine {
    width: 5px; height: 5px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: 2px; left: 2px;
  }

  .m-blush {
    position: absolute;
    width: 16px; height: 9px;
    background: var(--pink);
    border-radius: 50%;
    opacity: .55;
    bottom: 32px;
  }
  .m-blush.l { left: 11px; }
  .m-blush.r { right: 11px; }

  .m-mouth {
    position: absolute;
    bottom: 22px; left: 50%;
    transform: translateX(-50%);
    width: 40px; height: 20px;
    background: var(--orange);
    border-radius: 0 0 20px 20px;
    animation: smile 3s ease-in-out infinite;
  }
  @keyframes smile {
    0%,100% { width:40px; height:20px; }
    50%      { width:44px; height:22px; }
  }

  /* ===== タイトル ===== */
  .title-wrap { margin-bottom: .6rem; }
  .title-ja {
    font-size: clamp(2rem, 7vw, 2.8rem);
    font-weight: 900;
    letter-spacing: .06em;
    line-height: 1.2;
  }
  .t1 { color: var(--orange); }
  .t2 { color: var(--yellow); }
  .t3 { color: var(--green);  }
  .t4 { color: var(--blue);   }
  .t5 { color: var(--purple); }
  .t6 { color: var(--pink);   }
  .t7 { color: var(--orange); }
  .t8 { color: var(--yellow); }

  .title-char {
    display: inline-block;
    animation: titleBounce 2s ease-in-out infinite;
    text-shadow: 3px 3px 0 rgba(0,0,0,.1);
  }
  .title-char:nth-child(1){animation-delay:0s}
  .title-char:nth-child(2){animation-delay:.1s}
  .title-char:nth-child(3){animation-delay:.2s}
  .title-char:nth-child(4){animation-delay:.3s}
  .title-char:nth-child(5){animation-delay:.4s}
  .title-char:nth-child(6){animation-delay:.5s}
  .title-char:nth-child(7){animation-delay:.6s}
  .title-char:nth-child(8){animation-delay:.7s}
  @keyframes titleBounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }

  .subtitle {
    font-size: .9rem;
    color: #9ab0c8;
    letter-spacing: .15em;
    margin-top: .3rem;
  }

  /* ===== カテゴリバッジ ===== */
  .badges {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: .4rem;
    margin: 1rem 0 1.4rem;
  }
  .badge {
    font-size: .78rem;
    padding: .28rem .75rem;
    border-radius: 50px;
    color: white;
    font-weight: 700;
    animation: badgePop .5s cubic-bezier(.34,1.56,.64,1) both;
  }
  .badge:nth-child(1){background:var(--green);  box-shadow:0 3px 0 #4aa855; animation-delay:.3s}
  .badge:nth-child(2){background:var(--orange); box-shadow:0 3px 0 #c94040; animation-delay:.4s}
  .badge:nth-child(3){background:var(--pink);   box-shadow:0 3px 0 #cc6ea0; animation-delay:.5s}
  .badge:nth-child(4){background:var(--purple); box-shadow:0 3px 0 #9945d4; animation-delay:.6s}
  .badge:nth-child(5){background:var(--blue);   box-shadow:0 3px 0 #2a70e0; animation-delay:.7s}
  .badge:nth-child(6){background:var(--dark);   box-shadow:0 3px 0 #22224a; animation-delay:.8s}
  @keyframes badgePop {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  /* ===== スタートボタン ===== */
  .start-btn {
    display: block;
    width: 100%;
    font-family: 'Kosugi Maru', sans-serif;
    font-size: 1.4rem;
    font-weight: 900;
    color: white;
    background: linear-gradient(135deg, var(--orange) 0%, #ff8f00 100%);
    border: none;
    border-radius: 50px;
    padding: 1rem 2rem;
    cursor: pointer;
    box-shadow: 0 7px 0 #c94040, 0 12px 30px rgba(255,107,107,.4);
    letter-spacing: .1em;
    transition: all .15s;
    animation: btnGlow 2s ease-in-out infinite alternate, btnAppear .8s .5s cubic-bezier(.34,1.56,.64,1) both;
    position: relative;
    overflow: hidden;
  }
  .start-btn::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: rgba(255,255,255,.25);
    transform: skewX(-20deg);
    animation: btnShine 3s 1.5s ease-in-out infinite;
  }
  @keyframes btnShine {
    0%   { left: -100%; }
    40%  { left: 150%; }
    100% { left: 150%; }
  }
  @keyframes btnGlow {
    from { box-shadow: 0 7px 0 #c94040, 0 10px 20px rgba(255,107,107,.3); }
    to   { box-shadow: 0 7px 0 #c94040, 0 14px 40px rgba(255,107,107,.6); }
  }
  @keyframes btnAppear {
    from { transform: scale(.5) translateY(20px); opacity: 0; }
    to   { transform: scale(1)  translateY(0);    opacity: 1; }
  }
  .start-btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 11px 0 #c94040, 0 18px 40px rgba(255,107,107,.5);
  }
  .start-btn:active {
    transform: translateY(4px);
    box-shadow: 0 3px 0 #c94040;
  }

  /* ===== フッター ===== */
  .footer-note {
    margin-top: 1rem;
    font-size: .75rem;
    color: #b0c4d8;
  }

</style>
</head>
<body>

<!-- 背景 -->
<div class="bg">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="blob blob4"></div>
  <div id="stars"></div>
</div>

<!-- メインカード -->
<div class="card">

  <!-- マスコット -->
  <div class="mascot-area">
    <div class="mascot">
      <div class="m-ears">
        <div class="m-ear l"></div>
        <div class="m-ear r"></div>
      </div>
      <div class="m-body">
        <div class="m-eye l"><div class="m-shine"></div></div>
        <div class="m-eye r"><div class="m-shine"></div></div>
        <div class="m-blush l"></div>
        <div class="m-blush r"></div>
        <div class="m-mouth"></div>
      </div>
    </div>
  </div>

  <!-- タイトル -->
  <div class="title-wrap">
    <div class="title-ja">
      <span class="title-char t1">は</span><span class="title-char t2">な</span><span class="title-char t3">し</span><span class="title-char t4">て</span><span class="title-char t5">み</span><span class="title-char t6">よ</span><span class="title-char t7">う</span><span class="title-char t8">！</span>
    </div>
    <div class="subtitle">ことばをれんしゅうしよう 🎤</div>
  </div>

  <!-- カテゴリバッジ -->
  <div class="badges">
    <div class="badge">🐾 どうぶつ</div>
    <div class="badge">🍎 たべもの</div>
    <div class="badge">👨‍👩‍👧 かぞく</div>
    <div class="badge">🎨 いろ・かず</div>
    <div class="badge">🧹 さぎょう</div>
    <div class="badge">✏️ じぶんで</div>
  </div>

  <!-- スタートボタン -->
  <button class="start-btn" onclick="goStart()">
    🎤 はじめる！
  </button>

  <div class="footer-note">マイクのきょかがひつようです</div>

</div>

<script>
// 流れ星を生成
function buildStars() {
  const wrap = document.getElementById("stars");
  const colors = ["#FFD93D","#FF6B6B","#6BCB77","#4D96FF","#C77DFF","#FF9ECD"];
  for (let i = 0; i < 30; i++) {
    const s = document.createElement("div");
    s.className = "star";
    const size = 5 + Math.random() * 12;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${7+Math.random()*10}s;
      animation-delay:${Math.random()*10}s;
    `;
    wrap.appendChild(s);
  }
}

// スタートボタン
function goStart() {
  // ボタンをアニメーションしてから遷移
  const btn = document.querySelector(".start-btn");
  btn.textContent = "🚀 しゅっぱつ！";
  btn.style.transform = "scale(1.1)";
  setTimeout(() => {
    window.location.href = "hanashite_miyou.html";
  }, 400);
}

buildStars();
</script>
</body>
</html>
