<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>きろく帳 📅</title>
<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
<style>
  :root {
    --sky:#e8f4fd; --yellow:#FFD93D; --orange:#FF6B6B;
    --green:#6BCB77; --blue:#4D96FF; --purple:#C77DFF;
    --pink:#FF9ECD; --dark:#3a3a5c; --shadow:rgba(77,150,255,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--sky);font-family:'Kosugi Maru',sans-serif;min-height:100vh;padding-bottom:3rem}
  .bg-stars{position:fixed;inset:0;pointer-events:none;z-index:0}
  .star{position:absolute;border-radius:50%;opacity:.3;animation:floatUp linear infinite}
  @keyframes floatUp{0%{transform:translateY(0);opacity:.3}100%{transform:translateY(-120vh);opacity:0}}
  header{position:relative;z-index:1;text-align:center;padding:1.4rem 1rem .6rem}
  .page-title{font-size:clamp(1.6rem,6vw,2.4rem);font-weight:900;color:var(--dark)}
  .page-title span{display:inline-block;animation:tb 2s ease-in-out infinite}
  .page-title span:nth-child(1){color:var(--orange);animation-delay:0s}
  .page-title span:nth-child(2){color:var(--yellow);animation-delay:.1s}
  .page-title span:nth-child(3){color:var(--green);animation-delay:.2s}
  .page-title span:nth-child(4){color:var(--blue);animation-delay:.3s}
  .page-title span:nth-child(5){color:var(--purple);animation-delay:.4s}
  @keyframes tb{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .page-sub{font-size:.82rem;color:#9ab0c8;margin-top:.2rem}
  .main{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:0 1rem}
  .streak-banner{background:white;border-radius:28px;padding:1rem 1.4rem;box-shadow:0 8px 0 #c5d8ef;margin-bottom:1rem;display:flex;align-items:center;gap:1rem}
  .streak-fire{font-size:2.6rem;animation:fp 1s ease-in-out infinite alternate}
  @keyframes fp{from{transform:scale(1) rotate(-5deg)}to{transform:scale(1.15) rotate(5deg)}}
  .streak-info{flex:1}
  .streak-num{font-size:2rem;font-weight:900;color:var(--orange);line-height:1}
  .streak-label{font-size:.78rem;color:#9ab0c8;margin-top:.1rem}
  .streak-best{font-size:.76rem;color:#b0c4d8;margin-top:.15rem}
  .stats-row{display:flex;gap:.7rem;margin-bottom:1rem}
  .stat-card{flex:1;background:white;border-radius:22px;padding:.8rem .6rem;box-shadow:0 6px 0 #c5d8ef;text-align:center}
  .stat-icon{font-size:1.5rem;display:block;margin-bottom:.2rem}
  .stat-num{font-size:1.4rem;font-weight:900;color:var(--dark);line-height:1}
  .stat-lbl{font-size:.68rem;color:#9ab0c8;margin-top:.1rem}
  .cal-card{background:white;border-radius:28px;padding:1.2rem;box-shadow:0 8px 0 #c5d8ef;margin-bottom:1rem}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
  .cal-nav-btn{background:var(--sky);border:none;border-radius:50%;width:36px;height:36px;font-size:1.1rem;cursor:pointer;transition:all .15s;box-shadow:0 3px 0 #c5d8ef}
  .cal-nav-btn:hover{transform:translateY(-2px)}
  .cal-month{font-size:1.1rem;font-weight:900;color:var(--dark)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:.3rem}
  .cal-dow{text-align:center;font-size:.65rem;color:#b0c4d8;padding-bottom:.3rem;font-weight:700}
  .cal-dow:first-child{color:#FF6B6B}
  .cal-dow:last-child{color:#4D96FF}
  .cal-day{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;color:#c0d0e0;position:relative;transition:transform .15s}
  .cal-day.other-month{color:#ddd}
  .cal-day.today{border:3px solid var(--blue);color:var(--blue);font-weight:900}
  .cal-day.practiced{background:var(--green);color:white;font-weight:900;box-shadow:0 3px 0 #4aa855;cursor:pointer}
  .cal-day.practiced:hover{transform:scale(1.15)}
  .cal-day.hi{background:var(--orange);box-shadow:0 3px 0 #c94040}
  .cal-day.mid{background:var(--yellow);box-shadow:0 3px 0 #c9a800;color:var(--dark)}
  .tooltip{position:absolute;top:-58px;left:50%;transform:translateX(-50%);background:var(--dark);color:white;border-radius:12px;padding:.4rem .7rem;font-size:.68rem;white-space:nowrap;z-index:10;pointer-events:none;opacity:0;transition:opacity .2s}
  .tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--dark)}
  .cal-day.practiced:hover .tooltip{opacity:1}
  .log-btn{display:block;width:100%;font-family:'Kosugi Maru',sans-serif;font-size:1.1rem;font-weight:900;color:white;background:linear-gradient(135deg,var(--orange),#ff8f00);border:none;border-radius:50px;padding:.9rem;cursor:pointer;box-shadow:0 7px 0 #c94040;transition:all .15s;margin-bottom:1rem;position:relative;overflow:hidden}
  .log-btn::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:rgba(255,255,255,.25);transform:skewX(-20deg);animation:shine 3s ease-in-out infinite}
  @keyframes shine{0%{left:-100%}40%{left:150%}100%{left:150%}}
  .log-btn:hover{transform:translateY(-3px);box-shadow:0 10px 0 #c94040}
  .log-btn:active{transform:translateY(3px);box-shadow:0 3px 0 #c94040}
  .modal-bg{position:fixed;inset:0;background:rgba(58,58,92,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .25s}
  .modal-bg.open{opacity:1;pointer-events:all}
  .modal{background:white;border-radius:32px;padding:1.6rem 1.4rem;max-width:340px;width:100%;box-shadow:0 16px 0 #b8d4ee;transform:scale(.8);transition:transform .25s}
  .modal-bg.open .modal{transform:scale(1)}
  .modal-title{font-size:1.1rem;font-weight:900;color:var(--dark);margin-bottom:1rem;text-align:center}
  .modal-row{margin-bottom:.9rem}
  .modal-label{font-size:.75rem;color:#9ab0c8;margin-bottom:.3rem;letter-spacing:.08em}
  .modal-input{width:100%;font-family:'Kosugi Maru',sans-serif;font-size:1rem;border:3px solid #c5d8ef;border-radius:16px;padding:.5rem .8rem;outline:none;color:var(--dark)}
  .modal-input:focus{border-color:var(--blue)}
  .star-select{display:flex;gap:.5rem;justify-content:center;font-size:2rem;cursor:pointer}
  .star-select span{opacity:.3;transition:opacity .15s,transform .15s}
  .star-select span.on{opacity:1;transform:scale(1.2)}
  .modal-btns{display:flex;gap:.6rem;margin-top:1rem}
  .modal-save{flex:1;font-family:'Kosugi Maru',sans-serif;font-size:.95rem;font-weight:900;background:var(--green);color:white;border:none;border-radius:50px;padding:.7rem;cursor:pointer;box-shadow:0 4px 0 #4aa855}
  .modal-cancel{flex:1;font-family:'Kosugi Maru',sans-serif;font-size:.95rem;font-weight:900;background:white;color:#9ab0c8;border:3px solid #c5d8ef;border-radius:50px;padding:.7rem;cursor:pointer}
  .hist-card{background:white;border-radius:28px;padding:1.2rem;box-shadow:0 8px 0 #c5d8ef}
  .hist-title{font-size:.8rem;color:#a0b0c8;letter-spacing:.1em;margin-bottom:.7rem}
  .hist-item{display:flex;align-items:center;gap:.7rem;padding:.55rem 0;border-bottom:2px dashed #f0f4f8}
  .hist-item:last-child{border-bottom:none}
  .hist-date{font-size:.8rem;color:#7a8eab;min-width:70px}
  .hist-stars{font-size:1rem;min-width:54px}
  .hist-detail{flex:1;font-size:.78rem;color:#9ab0c8}
  .hist-del{background:none;border:none;cursor:pointer;color:#ffb3b3;font-size:.9rem}
  .hist-del:hover{color:var(--orange)}
  .no-hist{text-align:center;color:#c0d0e0;font-size:.85rem;padding:1.2rem 0}
  .back-btn{display:block;width:100%;font-family:'Kosugi Maru',sans-serif;font-size:.9rem;font-weight:700;color:#7a8eab;background:white;border:3px solid #c5d8ef;border-radius:50px;padding:.7rem;cursor:pointer;box-shadow:0 4px 0 #c5d8ef;text-align:center;margin-top:1rem;text-decoration:none;transition:all .15s}
  .back-btn:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<div class="bg-stars" id="bgStars"></div>
<header>
  <div class="page-title">
    <span>き</span><span>ろ</span><span>く</span><span>帳</span><span>📅</span>
  </div>
  <div class="page-sub">れんしゅうのあしあとをのこそう</div>
</header>
<div class="main">
  <div class="streak-banner">
    <div class="streak-fire">🔥</div>
    <div class="streak-info">
      <div class="streak-num" id="streakNum">0</div>
      <div class="streak-label">にちれんぞく！</div>
      <div class="streak-best" id="streakBest">さいこうきろく：0にち</div>
    </div>
    <div style="text-align:center">
      <div style="font-size:2rem" id="streakEmoji">😴</div>
      <div style="font-size:.65rem;color:#b0c4d8;margin-top:.2rem">きょうの<br>じょうたい</div>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><span class="stat-icon">📅</span><div class="stat-num" id="statDays">0</div><div class="stat-lbl">そうれんしゅうにち</div></div>
    <div class="stat-card"><span class="stat-icon">✅</span><div class="stat-num" id="statCorrect">0</div><div class="stat-lbl">そうせいかいすう</div></div>
    <div class="stat-card"><span class="stat-icon">⭐</span><div class="stat-num" id="statAvgStars">—</div><div class="stat-lbl">へいきんほし</div></div>
  </div>
  <div class="cal-card">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">◀</button>
      <div class="cal-month" id="calMonth"></div>
      <button class="cal-nav-btn" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
  <button class="log-btn" onclick="openModal()">📝 きょうのれんしゅうをきろくする</button>
  <div class="hist-card">
    <div class="hist-title">▼ れんしゅうりれき</div>
    <div id="histList"><div class="no-hist">まだきろくがないよ。れんしゅうしてみよう！🎤</div></div>
  </div>
  <a href="hanashite_miyou.html" class="back-btn">🎤 れんしゅうにもどる</a>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-title">📝 きょうのきろく</div>
    <div class="modal-row">
      <div class="modal-label">🗓 ひにち</div>
      <input class="modal-input" type="date" id="inputDate">
    </div>
    <div class="modal-row">
      <div class="modal-label">⏱ れんしゅうじかん（ふん）</div>
      <input class="modal-input" type="number" id="inputMinutes" placeholder="例：10" min="1" max="120">
    </div>
    <div class="modal-row">
      <div class="modal-label">✅ せいかいすう</div>
      <input class="modal-input" type="number" id="inputCorrect" placeholder="例：5" min="0" max="999">
    </div>
    <div class="modal-row">
      <div class="modal-label">⭐ きょうのひょうか</div>
      <div class="star-select" id="starSelect">
        <span data-s="1" onclick="selectStar(1)">⭐</span>
        <span data-s="2" onclick="selectStar(2)">⭐</span>
        <span data-s="3" onclick="selectStar(3)">⭐</span>
      </div>
    </div>
    <div class="modal-row">
      <div class="modal-label">💬 メモ</div>
      <input class="modal-input" type="text" id="inputMemo" placeholder="きょうはよくできた！など">
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
      <button class="modal-save" onclick="saveRecord()">💾 きろくする</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = "hanashite_records_v2";

function loadRecords() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
  catch(e) { return []; }
}
function saveRecords(r) { localStorage.setItem(STORAGE_KEY, JSON.stringify(r)); }

function todayStr() {
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

function dateOffset(dateStr, days) {
  const d = new Date(dateStr); d.setDate(d.getDate() + days);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

// カレンダー
let calYear = new Date().getFullYear();
let calMon = new Date().getMonth();

function renderCalendar() {
  const records = loadRecords();
  const byDate = {};
  records.forEach(r => { byDate[r.date] = r; });
  const today = todayStr();
  const monthNames = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  document.getElementById("calMonth").textContent = calYear + "年 " + monthNames[calMon];
  const grid = document.getElementById("calGrid");
  grid.innerHTML = "";
  ["日","月","火","水","木","金","土"].forEach(d => {
    const el = document.createElement("div"); el.className = "cal-dow"; el.textContent = d; grid.appendChild(el);
  });
  const firstDay = new Date(calYear, calMon, 1).getDay();
  const daysInMonth = new Date(calYear, calMon+1, 0).getDate();
  const daysInPrev = new Date(calYear, calMon, 0).getDate();
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement("div"); el.className = "cal-day other-month";
    el.textContent = daysInPrev - firstDay + 1 + i; grid.appendChild(el);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = calYear+"-"+String(calMon+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    const el = document.createElement("div"); el.className = "cal-day"; el.textContent = d;
    if (ds === today) el.classList.add("today");
    if (byDate[ds]) {
      el.classList.add("practiced");
      const rec = byDate[ds];
      const s = rec.stars || 0;
      if (s >= 3) el.classList.add("hi");
      else if (s === 2) el.classList.add("mid");
      const tip = document.createElement("div"); tip.className = "tooltip";
      tip.textContent = (rec.minutes||0)+"ふん ✅"+(rec.correct||0)+"こ "+"⭐".repeat(s) + (rec.memo ? " "+rec.memo : "");
      el.appendChild(tip);
    }
    grid.appendChild(el);
  }
}

function changeMonth(delta) {
  calMon += delta;
  if (calMon > 11) { calMon = 0; calYear++; }
  if (calMon < 0)  { calMon = 11; calYear--; }
  renderCalendar();
}

// ストリーク計算
function calcStreak(records) {
  const dateSet = new Set(records.map(r => r.date));
  if (dateSet.size === 0) return {current:0, best:0};
  const today = todayStr();
  let current = 0, check = today;
  while (dateSet.has(check)) { current++; check = dateOffset(check, -1); }
  if (current === 0) {
    check = dateOffset(today, -1);
    while (dateSet.has(check)) { current++; check = dateOffset(check, -1); }
  }
  const sorted = [...dateSet].sort();
  let best = 1, streak = 1;
  for (let i = 1; i < sorted.length; i++) {
    if (dateOffset(sorted[i-1], 1) === sorted[i]) { streak++; }
    else { streak = 1; }
    best = Math.max(best, streak);
  }
  best = Math.max(best, current);
  return {current, best};
}

// 統計
function updateStats() {
  const records = loadRecords();
  const days = new Set(records.map(r => r.date)).size;
  const totalCorrect = records.reduce((a,r) => a+(r.correct||0), 0);
  const sa = records.map(r => r.stars).filter(s => s > 0);
  const avg = sa.length ? (sa.reduce((a,b)=>a+b,0)/sa.length).toFixed(1) : "—";
  document.getElementById("statDays").textContent = days;
  document.getElementById("statCorrect").textContent = totalCorrect;
  document.getElementById("statAvgStars").textContent = avg;
  const {current, best} = calcStreak(records);
  document.getElementById("streakNum").textContent = current;
  document.getElementById("streakBest").textContent = "さいこうきろく："+best+"にち";
  const todayDone = records.some(r => r.date === todayStr());
  document.getElementById("streakEmoji").textContent = current>=7?"🏆":current>=3?"🔥":todayDone?"✅":"😴";
}

// 履歴
function renderHistory() {
  const records = loadRecords().sort((a,b) => b.date.localeCompare(a.date)).slice(0,20);
  const el = document.getElementById("histList");
  if (!records.length) { el.innerHTML='<div class="no-hist">まだきろくがないよ。れんしゅうしてみよう！🎤</div>'; return; }
  el.innerHTML = records.map(r =>
    '<div class="hist-item">' +
    '<div class="hist-date">'+r.date.slice(5).replace("-","/")+'</div>' +
    '<div class="hist-stars">'+"⭐".repeat(r.stars||0)+'</div>' +
    '<div class="hist-detail">⏱'+(r.minutes||0)+'ふん ✅'+(r.correct||0)+'こ'+(r.memo?" 💬"+r.memo:"")+'</div>' +
    '<button class="hist-del" onclick="deleteRecord(\''+r.id+'\')">✕</button>' +
    '</div>'
  ).join("");
}

function deleteRecord(id) {
  if (!confirm("このきろくをけしますか？")) return;
  saveRecords(loadRecords().filter(r => r.id !== id));
  refresh();
}

// モーダル
let selectedStars = 3;
function openModal() {
  document.getElementById("inputDate").value = todayStr();
  document.getElementById("inputMinutes").value = "";
  document.getElementById("inputCorrect").value = "";
  document.getElementById("inputMemo").value = "";
  selectedStars = 3; updateStarUI();
  document.getElementById("modalBg").classList.add("open");
}
function closeModal() { document.getElementById("modalBg").classList.remove("open"); }
function selectStar(n) { selectedStars = n; updateStarUI(); }
function updateStarUI() {
  document.querySelectorAll("#starSelect span").forEach((el,i) => el.classList.toggle("on", i < selectedStars));
}

function saveRecord() {
  const date = document.getElementById("inputDate").value;
  const minutes = parseInt(document.getElementById("inputMinutes").value) || 0;
  const correct = parseInt(document.getElementById("inputCorrect").value) || 0;
  const memo = document.getElementById("inputMemo").value.trim();
  if (!date) { alert("ひにちをえらんでね！"); return; }
  const records = loadRecords();
  const idx = records.findIndex(r => r.date === date);
  const entry = {id: date+"_"+Date.now(), date, minutes, correct, stars: selectedStars, memo};
  if (idx >= 0) { entry.id = records[idx].id; records[idx] = entry; }
  else records.push(entry);
  saveRecords(records);
  closeModal(); refresh(); launchConfetti();
}

function refresh() { renderCalendar(); updateStats(); renderHistory(); }

// 背景
function buildBgStars() {
  const wrap = document.getElementById("bgStars");
  const colors = ["#FFD93D","#FF6B6B","#6BCB77","#4D96FF","#C77DFF","#FF9ECD"];
  for (let i = 0; i < 20; i++) {
    const s = document.createElement("div"); s.className = "star";
    const size = 6+Math.random()*12;
    s.style.cssText="width:"+size+"px;height:"+size+"px;left:"+Math.random()*100+"%;top:"+Math.random()*100+"%;background:"+colors[Math.floor(Math.random()*colors.length)]+";animation-duration:"+(8+Math.random()*10)+"s;animation-delay:"+(-Math.random()*10)+"s;";
    wrap.appendChild(s);
  }
}

// 花火
function launchConfetti() {
  const colors = ["#FFD93D","#FF6B6B","#6BCB77","#4D96FF","#C77DFF","#FF9ECD"];
  for (let i = 0; i < 30; i++) {
    const p = document.createElement("div");
    p.style.cssText="position:fixed;left:"+Math.random()*100+"%;top:-10px;width:10px;height:10px;border-radius:"+(Math.random()>.5?"50%":"2px")+";background:"+colors[Math.floor(Math.random()*colors.length)]+";animation:cf "+(1+Math.random())+"s "+(Math.random()*.5)+"s linear forwards;z-index:200;pointer-events:none";
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 2000);
  }
}
const sty = document.createElement("style");
sty.textContent="@keyframes cf{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}";
document.head.appendChild(sty);

document.getElementById("modalBg").addEventListener("click", e => { if (e.target===e.currentTarget) closeModal(); });

buildBgStars(); updateStarUI(); refresh();
</script>
</body>
</html>
