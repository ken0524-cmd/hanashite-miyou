<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>きろく帳 🌟</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --sky:#d6eeff; --yellow:#FFD93D; --orange:#FF6B6B;
    --green:#6BCB77; --blue:#4D96FF; --purple:#C77DFF;
    --pink:#FF9ECD; --dark:#3a3a5c; --cream:#fffbf0;
    --shadow:rgba(77,150,255,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box}

  body {
    font-family:'Zen Maru Gothic',sans-serif;
    min-height:100vh;
    padding-bottom:4rem;
    background:#e8f4fd;
    position:relative;
  }

  /* ===== 背景 ===== */
  .bg-grad {
    position:fixed;inset:0;z-index:0;
    background:
      radial-gradient(ellipse at 15% 15%, #ffe0f0 0%, transparent 50%),
      radial-gradient(ellipse at 85% 80%, #d0eeff 0%, transparent 50%),
      radial-gradient(ellipse at 60% 5%,  #fff8a0 0%, transparent 40%),
      linear-gradient(160deg,#edf8ff 0%,#fde8ff 100%);
  }
  .bubbles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .bub{position:absolute;border-radius:50%;opacity:0;animation:bubRise linear infinite}
  @keyframes bubRise{
    0%{transform:translateY(110vh) scale(.5);opacity:0}
    5%{opacity:.5} 90%{opacity:.2}
    100%{transform:translateY(-10vh) scale(1.1);opacity:0}
  }
  .sparkle{position:fixed;pointer-events:none;z-index:0;animation:twinkle ease-in-out infinite;user-select:none}
  @keyframes twinkle{0%,100%{opacity:0;transform:scale(.4) rotate(0)}50%{opacity:1;transform:scale(1.3) rotate(25deg)}}

  /* ===== ヘッダー ===== */
  header{position:relative;z-index:1;text-align:center;padding:1.6rem 1rem .8rem}
  .page-title{
    font-size:clamp(1.8rem,7vw,2.8rem);font-weight:900;
    line-height:1.1;
  }
  .tc{display:inline-block;animation:tdance 2s ease-in-out infinite;text-shadow:3px 3px 0 rgba(0,0,0,.1)}
  .tc:nth-child(1){color:var(--orange);animation-delay:0s}
  .tc:nth-child(2){color:var(--yellow);animation-delay:.08s}
  .tc:nth-child(3){color:var(--green); animation-delay:.16s}
  .tc:nth-child(4){color:var(--blue);  animation-delay:.24s}
  .tc:nth-child(5){color:var(--purple);animation-delay:.32s}
  @keyframes tdance{0%,100%{transform:translateY(0) rotate(0)}30%{transform:translateY(-10px) rotate(-4deg)}60%{transform:translateY(-6px) rotate(3deg)}}
  .page-sub{font-size:.85rem;color:#9ab0c8;letter-spacing:.15em;margin-top:.35rem}

  /* ===== メイン ===== */
  .main{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:0 1rem}

  /* ===== ストリークバナー ===== */
  .streak-banner{
    background:rgba(255,255,255,.85);backdrop-filter:blur(12px);
    border-radius:32px;padding:1.1rem 1.4rem;
    box-shadow:0 10px 0 #c0d8f0,0 16px 40px rgba(100,150,255,.15),0 0 0 3px rgba(255,255,255,.9);
    margin-bottom:.9rem;
    display:flex;align-items:center;gap:1rem;
    animation:cardPop .6s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes cardPop{from{transform:scale(.8) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
  .streak-fire{font-size:3rem;animation:fireBounce 1s ease-in-out infinite alternate}
  @keyframes fireBounce{from{transform:scale(1) rotate(-8deg)}to{transform:scale(1.2) rotate(8deg)}}
  .streak-info{flex:1}
  .streak-num{
    font-size:2.6rem;font-weight:900;color:var(--orange);line-height:1;
    text-shadow:3px 3px 0 rgba(255,107,107,.25);
  }
  .streak-label{font-size:.82rem;color:#9ab0c8;margin-top:.1rem;font-weight:700}
  .streak-best{font-size:.72rem;color:#b8c8d8;margin-top:.15rem}
  .streak-right{text-align:center}
  .streak-emoji{font-size:2.4rem;animation:emojiBob 2s ease-in-out infinite}
  @keyframes emojiBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .streak-status-lbl{font-size:.62rem;color:#b0c4d8;margin-top:.2rem;letter-spacing:.05em}

  /* ===== スタッツカード ===== */
  .stats-row{display:flex;gap:.7rem;margin-bottom:.9rem}
  .stat-card{
    flex:1;
    background:rgba(255,255,255,.85);backdrop-filter:blur(12px);
    border-radius:24px;padding:.9rem .5rem;
    box-shadow:0 6px 0 #c0d8f0,0 0 0 3px rgba(255,255,255,.9);
    text-align:center;
    animation:cardPop .6s cubic-bezier(.34,1.56,.64,1) both;
  }
  .stat-card:nth-child(1){animation-delay:.05s}
  .stat-card:nth-child(2){animation-delay:.1s}
  .stat-card:nth-child(3){animation-delay:.15s}
  .stat-icon{font-size:1.7rem;display:block;margin-bottom:.3rem;animation:iconBob 2.5s ease-in-out infinite}
  .stat-card:nth-child(1) .stat-icon{animation-delay:0s}
  .stat-card:nth-child(2) .stat-icon{animation-delay:.3s}
  .stat-card:nth-child(3) .stat-icon{animation-delay:.6s}
  @keyframes iconBob{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-5px) scale(1.1)}}
  .stat-num{font-size:1.6rem;font-weight:900;color:var(--dark);line-height:1;text-shadow:2px 2px 0 rgba(0,0,0,.07)}
  .stat-lbl{font-size:.65rem;color:#9ab0c8;margin-top:.15rem;font-weight:700;letter-spacing:.04em}

  /* ===== カレンダー ===== */
  .cal-card{
    background:rgba(255,255,255,.85);backdrop-filter:blur(12px);
    border-radius:32px;padding:1.3rem;
    box-shadow:0 10px 0 #c0d8f0,0 0 0 3px rgba(255,255,255,.9);
    margin-bottom:.9rem;
    animation:cardPop .6s .1s cubic-bezier(.34,1.56,.64,1) both;
  }
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
  .cal-nav-btn{
    background:linear-gradient(135deg,var(--blue),#3a7de8);
    border:none;border-radius:50%;width:40px;height:40px;
    font-size:1rem;cursor:pointer;transition:all .15s;
    box-shadow:0 4px 0 #2a60c0,0 0 0 3px rgba(255,255,255,.8);
    color:white;font-weight:900;
  }
  .cal-nav-btn:hover{transform:translateY(-3px) scale(1.1);box-shadow:0 7px 0 #2a60c0}
  .cal-nav-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #2a60c0}
  .cal-month{font-size:1.15rem;font-weight:900;color:var(--dark)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:.28rem}
  .cal-dow{text-align:center;font-size:.68rem;color:#b0c4d8;padding-bottom:.35rem;font-weight:900}
  .cal-dow:first-child{color:var(--orange)}
  .cal-dow:last-child{color:var(--blue)}
  .cal-day{
    aspect-ratio:1;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:.78rem;color:#c0d0e0;
    position:relative;transition:transform .15s;
    font-weight:700;
  }
  .cal-day.other-month{color:#dde8f0}
  .cal-day.today{
    border:3px solid var(--blue);color:var(--blue);
    font-weight:900;background:rgba(77,150,255,.1);
  }
  .cal-day.practiced{
    background:linear-gradient(135deg,var(--green),#4ab860);
    color:white;font-weight:900;
    box-shadow:0 4px 0 #3a9848,0 0 0 2px rgba(255,255,255,.6);
    cursor:pointer;
  }
  .cal-day.practiced:hover{transform:scale(1.2)}
  .cal-day.hi{background:linear-gradient(135deg,var(--orange),#ff4500);box-shadow:0 4px 0 #c94040,0 0 0 2px rgba(255,255,255,.6)}
  .cal-day.mid{background:linear-gradient(135deg,var(--yellow),#ffc000);box-shadow:0 4px 0 #c9a800,0 0 0 2px rgba(255,255,255,.6);color:var(--dark)}
  .tooltip{
    position:absolute;top:-58px;left:50%;transform:translateX(-50%);
    background:var(--dark);color:white;border-radius:14px;
    padding:.45rem .8rem;font-size:.65rem;white-space:nowrap;
    z-index:10;pointer-events:none;opacity:0;transition:opacity .2s;
    box-shadow:0 4px 12px rgba(0,0,0,.2);
  }
  .tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--dark)}
  .cal-day.practiced:hover .tooltip{opacity:1}

  /* ===== ログボタン ===== */
  .log-btn{
    display:block;width:100%;
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:1.15rem;font-weight:900;color:white;
    background:linear-gradient(135deg,#ff7c7c 0%,#ff5500 100%);
    border:none;border-radius:50px;padding:1rem;cursor:pointer;
    box-shadow:0 8px 0 #c94040,0 14px 36px rgba(255,107,107,.35),0 0 0 3px rgba(255,255,255,.7);
    letter-spacing:.08em;transition:all .15s;
    margin-bottom:.9rem;position:relative;overflow:hidden;
    animation:cardPop .6s .15s cubic-bezier(.34,1.56,.64,1) both;
  }
  .log-btn::after{
    content:'';position:absolute;top:0;left:-100%;
    width:55%;height:100%;background:rgba(255,255,255,.3);
    transform:skewX(-22deg);animation:btnShine 2.5s 1s ease-in-out infinite;
  }
  @keyframes btnShine{0%{left:-100%}40%{left:150%}100%{left:150%}}
  .log-btn:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 12px 0 #c94040,0 20px 46px rgba(255,107,107,.45)}
  .log-btn:active{transform:translateY(4px);box-shadow:0 4px 0 #c94040}

  /* ===== 履歴カード ===== */
  .hist-card{
    background:rgba(255,255,255,.85);backdrop-filter:blur(12px);
    border-radius:32px;padding:1.3rem;
    box-shadow:0 10px 0 #c0d8f0,0 0 0 3px rgba(255,255,255,.9);
    animation:cardPop .6s .2s cubic-bezier(.34,1.56,.64,1) both;
  }
  .hist-title{
    font-size:.82rem;color:#9ab0c8;letter-spacing:.12em;
    margin-bottom:.8rem;font-weight:900;
  }
  .hist-item{
    display:flex;align-items:center;gap:.7rem;
    padding:.6rem .4rem;
    border-bottom:3px dashed #eef4fa;
    transition:background .15s;border-radius:12px;
  }
  .hist-item:last-child{border-bottom:none}
  .hist-item:hover{background:rgba(77,150,255,.05)}
  .hist-date{
    font-size:.82rem;color:#7a8eab;min-width:52px;
    font-weight:700;
  }
  .hist-stars{font-size:1rem;min-width:56px}
  .hist-detail{flex:1;font-size:.76rem;color:#9ab0c8;line-height:1.5}
  .hist-del{
    background:none;border:none;cursor:pointer;
    color:#ffb3b3;font-size:1rem;padding:.2rem .4rem;
    border-radius:50%;transition:all .15s;
  }
  .hist-del:hover{color:var(--orange);background:rgba(255,107,107,.1);transform:scale(1.2)}
  .no-hist{text-align:center;color:#c0d0e0;font-size:.88rem;padding:1.4rem 0;line-height:1.8}

  /* ===== もどるボタン ===== */
  .back-btn{
    display:block;width:100%;
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:.95rem;font-weight:700;color:#7a8eab;
    background:rgba(255,255,255,.85);
    border:3px solid #c5d8ef;border-radius:50px;
    padding:.75rem;cursor:pointer;
    box-shadow:0 5px 0 #c0d8f0,0 0 0 2px rgba(255,255,255,.8);
    text-align:center;margin-top:.9rem;text-decoration:none;
    transition:all .15s;display:block;
    animation:cardPop .6s .25s cubic-bezier(.34,1.56,.64,1) both;
  }
  .back-btn:hover{transform:translateY(-3px);box-shadow:0 8px 0 #b0cce8}
  .back-btn:active{transform:translateY(2px);box-shadow:0 3px 0 #b0cce8}

  /* ===== モーダル ===== */
  .modal-bg{
    position:fixed;inset:0;
    background:rgba(58,58,92,.5);
    backdrop-filter:blur(4px);
    z-index:50;display:flex;align-items:center;justify-content:center;
    padding:1rem;opacity:0;pointer-events:none;transition:opacity .25s;
  }
  .modal-bg.open{opacity:1;pointer-events:all}
  .modal{
    background:white;border-radius:36px;
    padding:1.8rem 1.6rem;max-width:340px;width:100%;
    box-shadow:0 20px 0 #b0cce8,0 30px 60px rgba(100,150,255,.25),0 0 0 4px rgba(255,255,255,.9);
    transform:scale(.7) translateY(40px);transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  }
  .modal-bg.open .modal{transform:scale(1) translateY(0)}
  .modal-title{
    font-size:1.2rem;font-weight:900;color:var(--dark);
    margin-bottom:1.1rem;text-align:center;
    letter-spacing:.05em;
  }
  .modal-row{margin-bottom:.85rem}
  .modal-label{font-size:.74rem;color:#9ab0c8;margin-bottom:.3rem;letter-spacing:.08em;font-weight:700}
  .modal-input{
    width:100%;font-family:'Zen Maru Gothic',sans-serif;
    font-size:1rem;border:3px solid #c5d8ef;border-radius:18px;
    padding:.55rem .9rem;outline:none;color:var(--dark);
    transition:border-color .15s;
    background:rgba(230,242,255,.3);
  }
  .modal-input:focus{border-color:var(--blue);background:white}
  .star-select{
    display:flex;gap:.6rem;justify-content:center;
    font-size:2.2rem;cursor:pointer;
  }
  .star-select span{
    opacity:.25;transition:opacity .15s,transform .2s;
    animation:none;
  }
  .star-select span.on{
    opacity:1;transform:scale(1.25);
    animation:starPop .3s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes starPop{from{transform:scale(0.5)}to{transform:scale(1.25)}}
  .modal-btns{display:flex;gap:.6rem;margin-top:1.1rem}
  .modal-save{
    flex:1;font-family:'Zen Maru Gothic',sans-serif;
    font-size:1rem;font-weight:900;
    background:linear-gradient(135deg,var(--green),#4ab860);
    color:white;border:none;border-radius:50px;padding:.75rem;
    cursor:pointer;box-shadow:0 5px 0 #3a9848;
    transition:all .15s;
  }
  .modal-save:hover{transform:translateY(-2px);box-shadow:0 7px 0 #3a9848}
  .modal-save:active{transform:translateY(2px);box-shadow:0 3px 0 #3a9848}
  .modal-cancel{
    flex:1;font-family:'Zen Maru Gothic',sans-serif;
    font-size:1rem;font-weight:900;background:white;
    color:#9ab0c8;border:3px solid #c5d8ef;border-radius:50px;
    padding:.75rem;cursor:pointer;transition:all .15s;
  }
  .modal-cancel:hover{background:var(--sky)}

  /* ===== 花火 ===== */
  @keyframes cf{0%{transform:translateY(0) rotate(0) scale(1);opacity:1}100%{transform:translateY(100vh) rotate(720deg) scale(.3);opacity:0}}
</style>
</head>
<body>

<div class="bg-grad"></div>
<div class="bubbles" id="bubbles"></div>
<div id="sparkles"></div>

<header>
  <div class="page-title">
    <span class="tc">き</span><span class="tc">ろ</span><span class="tc">く</span><span class="tc">ちょ</span><span class="tc">う</span>
  </div>
  <div class="page-sub">🌟 れんしゅうのあしあとをのこそう 🌟</div>
</header>

<div class="main">

  <!-- ストリーク -->
  <div class="streak-banner">
    <div class="streak-fire">🔥</div>
    <div class="streak-info">
      <div class="streak-num" id="streakNum">0</div>
      <div class="streak-label">にちれんぞく！🎉</div>
      <div class="streak-best" id="streakBest">さいこう：0にち</div>
    </div>
    <div class="streak-right">
      <div class="streak-emoji" id="streakEmoji">😴</div>
      <div class="streak-status-lbl">きょうの<br>じょうたい</div>
    </div>
  </div>

  <!-- スタッツ -->
  <div class="stats-row">
    <div class="stat-card">
      <span class="stat-icon">📅</span>
      <div class="stat-num" id="statDays">0</div>
      <div class="stat-lbl">れんしゅう<br>にっすう</div>
    </div>
    <div class="stat-card">
      <span class="stat-icon">✅</span>
      <div class="stat-num" id="statCorrect">0</div>
      <div class="stat-lbl">せいかい<br>すうけい</div>
    </div>
    <div class="stat-card">
      <span class="stat-icon">⭐</span>
      <div class="stat-num" id="statAvgStars">—</div>
      <div class="stat-lbl">へいきん<br>ほし</div>
    </div>
  </div>

  <!-- カレンダー -->
  <div class="cal-card">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">◀</button>
      <div class="cal-month" id="calMonth"></div>
      <button class="cal-nav-btn" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- きろくボタン -->
  <button class="log-btn" onclick="openModal()">✏️ きょうのれんしゅうをきろくする！</button>

  <!-- 履歴 -->
  <div class="hist-card">
    <div class="hist-title">⭐ れんしゅうのきろく</div>
    <div id="histList">
      <div class="no-hist">まだきろくがないよ！<br>れんしゅうしてみよう！🎤<br><br>🌈 きろくがたまると<br>たのしいことがおきるかも！</div>
    </div>
  </div>

  <a href="hanashite_miyou.html" class="back-btn">🎤 れんしゅうにもどる</a>
</div>

<!-- モーダル -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-title">📝 きょうのきろく</div>
    <div class="modal-row">
      <div class="modal-label">🗓 ひにち</div>
      <input class="modal-input" type="date" id="inputDate">
    </div>
    <div class="modal-row">
      <div class="modal-label">⏱ れんしゅうじかん（ふん）</div>
      <input class="modal-input" type="number" id="inputMinutes" placeholder="例：10" min="1" max="120">
    </div>
    <div class="modal-row">
      <div class="modal-label">✅ せいかいすう</div>
      <input class="modal-input" type="number" id="inputCorrect" placeholder="例：5" min="0" max="999">
    </div>
    <div class="modal-row">
      <div class="modal-label">⭐ きょうのひょうか</div>
      <div class="star-select" id="starSelect">
        <span data-s="1" onclick="selectStar(1)">⭐</span>
        <span data-s="2" onclick="selectStar(2)">⭐</span>
        <span data-s="3" onclick="selectStar(3)">⭐</span>
      </div>
    </div>
    <div class="modal-row">
      <div class="modal-label">💬 メモ</div>
      <input class="modal-input" type="text" id="inputMemo" placeholder="きょうはよくできた！など">
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">やめる</button>
      <button class="modal-save" onclick="saveRecord()">💾 きろくする！</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = "hanashite_records_v2";

function loadRecords() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
  catch(e) { return []; }
}
function saveRecords(r) { localStorage.setItem(STORAGE_KEY, JSON.stringify(r)); }

function todayStr() {
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function dateOffset(dateStr, days) {
  const d = new Date(dateStr); d.setDate(d.getDate() + days);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

// カレンダー
let calYear = new Date().getFullYear();
let calMon  = new Date().getMonth();

function renderCalendar() {
  const records = loadRecords();
  const byDate = {};
  records.forEach(r => { byDate[r.date] = r; });
  const today = todayStr();
  const monthNames = ["1がつ","2がつ","3がつ","4がつ","5がつ","6がつ","7がつ","8がつ","9がつ","10がつ","11がつ","12がつ"];
  document.getElementById("calMonth").textContent = calYear + "ねん " + monthNames[calMon];
  const grid = document.getElementById("calGrid");
  grid.innerHTML = "";
  ["日","月","火","水","木","金","土"].forEach(d => {
    const el = document.createElement("div"); el.className = "cal-dow"; el.textContent = d; grid.appendChild(el);
  });
  const firstDay = new Date(calYear, calMon, 1).getDay();
  const daysInMonth = new Date(calYear, calMon+1, 0).getDate();
  const daysInPrev = new Date(calYear, calMon, 0).getDate();
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement("div"); el.className = "cal-day other-month";
    el.textContent = daysInPrev - firstDay + 1 + i; grid.appendChild(el);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = calYear+"-"+String(calMon+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    const el = document.createElement("div"); el.className = "cal-day"; el.textContent = d;
    if (ds === today) el.classList.add("today");
    if (byDate[ds]) {
      el.classList.add("practiced");
      const rec = byDate[ds];
      const s = rec.stars || 0;
      if (s >= 3) el.classList.add("hi");
      else if (s === 2) el.classList.add("mid");
      const tip = document.createElement("div"); tip.className = "tooltip";
      tip.textContent = (rec.minutes||0)+"ふん ✅"+(rec.correct||0)+"こ "+"⭐".repeat(s) + (rec.memo ? " "+rec.memo : "");
      el.appendChild(tip);
    }
    grid.appendChild(el);
  }
}

function changeMonth(delta) {
  calMon += delta;
  if (calMon > 11) { calMon = 0; calYear++; }
  if (calMon < 0)  { calMon = 11; calYear--; }
  renderCalendar();
}

// ストリーク計算
function calcStreak(records) {
  const dateSet = new Set(records.map(r => r.date));
  if (dateSet.size === 0) return {current:0, best:0};
  const today = todayStr();
  let current = 0, check = today;
  while (dateSet.has(check)) { current++; check = dateOffset(check, -1); }
  if (current === 0) {
    check = dateOffset(today, -1);
    while (dateSet.has(check)) { current++; check = dateOffset(check, -1); }
  }
  const sorted = [...dateSet].sort();
  let best = 1, streak = 1;
  for (let i = 1; i < sorted.length; i++) {
    if (dateOffset(sorted[i-1], 1) === sorted[i]) streak++;
    else streak = 1;
    best = Math.max(best, streak);
  }
  best = Math.max(best, current);
  return {current, best};
}

// 統計
function updateStats() {
  const records = loadRecords();
  const days = new Set(records.map(r => r.date)).size;
  const totalCorrect = records.reduce((a,r) => a+(r.correct||0), 0);
  const sa = records.map(r => r.stars).filter(s => s > 0);
  const avg = sa.length ? (sa.reduce((a,b)=>a+b,0)/sa.length).toFixed(1) : "—";
  document.getElementById("statDays").textContent = days;
  document.getElementById("statCorrect").textContent = totalCorrect;
  document.getElementById("statAvgStars").textContent = avg;
  const {current, best} = calcStreak(records);
  document.getElementById("streakNum").textContent = current;
  document.getElementById("streakBest").textContent = "さいこう："+best+"にち";
  const todayDone = records.some(r => r.date === todayStr());
  document.getElementById("streakEmoji").textContent = current>=7?"🏆":current>=3?"🔥":todayDone?"✅":"😴";
}

// 履歴
function renderHistory() {
  const records = loadRecords().sort((a,b) => b.date.localeCompare(a.date)).slice(0,20);
  const el = document.getElementById("histList");
  if (!records.length) {
    el.innerHTML='<div class="no-hist">まだきろくがないよ！<br>れんしゅうしてみよう！🎤<br><br>🌈 きろくがたまると<br>たのしいことがおきるかも！</div>';
    return;
  }
  el.innerHTML = records.map(r =>
    '<div class="hist-item">' +
    '<div class="hist-date">'+r.date.slice(5).replace("-","／")+'</div>' +
    '<div class="hist-stars">'+"⭐".repeat(r.stars||0)+'</div>' +
    '<div class="hist-detail">⏱'+(r.minutes||0)+'ふん ✅'+(r.correct||0)+'こ'+(r.memo?" 💬"+r.memo:"")+'</div>' +
    '<button class="hist-del" onclick="deleteRecord(\''+r.id+'\')">✕</button>' +
    '</div>'
  ).join("");
}

function deleteRecord(id) {
  if (!confirm("このきろくをけしますか？")) return;
  saveRecords(loadRecords().filter(r => r.id !== id));
  refresh();
}

// モーダル
let selectedStars = 3;
function openModal() {
  document.getElementById("inputDate").value = todayStr();
  document.getElementById("inputMinutes").value = "";
  document.getElementById("inputCorrect").value = "";
  document.getElementById("inputMemo").value = "";
  selectedStars = 3; updateStarUI();
  document.getElementById("modalBg").classList.add("open");
}
function closeModal() { document.getElementById("modalBg").classList.remove("open"); }
function selectStar(n) { selectedStars = n; updateStarUI(); }
function updateStarUI() {
  document.querySelectorAll("#starSelect span").forEach((el,i) => el.classList.toggle("on", i < selectedStars));
}

function saveRecord() {
  const date = document.getElementById("inputDate").value;
  const minutes = parseInt(document.getElementById("inputMinutes").value) || 0;
  const correct = parseInt(document.getElementById("inputCorrect").value) || 0;
  const memo = document.getElementById("inputMemo").value.trim();
  if (!date) { alert("ひにちをえらんでね！"); return; }
  const records = loadRecords();
  const idx = records.findIndex(r => r.date === date);
  const entry = {id: date+"_"+Date.now(), date, minutes, correct, stars: selectedStars, memo};
  if (idx >= 0) { entry.id = records[idx].id; records[idx] = entry; }
  else records.push(entry);
  saveRecords(records);
  closeModal(); refresh(); launchConfetti();
}

function refresh() { renderCalendar(); updateStats(); renderHistory(); }

// 背景の泡
function buildBubbles() {
  const wrap = document.getElementById('bubbles');
  const cols = ['#FFD93D','#FF6B6B','#6BCB77','#4D96FF','#C77DFF','#FF9ECD'];
  for (let i=0;i<20;i++) {
    const b = document.createElement('div'); b.className='bub';
    const sz=16+Math.random()*44, col=cols[i%cols.length];
    b.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;background:${col}28;border:2px solid ${col}44;animation-duration:${9+Math.random()*12}s;animation-delay:${Math.random()*12}s`;
    wrap.appendChild(b);
  }
}

// きらきら
function buildSparkles() {
  const wrap = document.getElementById('sparkles');
  const icons = ['✨','⭐','🌟','💫','🎀','🎵','💕','🎶'];
  for (let i=0;i<14;i++) {
    const s=document.createElement('div'); s.className='sparkle';
    s.textContent=icons[i%icons.length];
    s.style.cssText=`left:${5+Math.random()*90}%;top:${5+Math.random()*90}%;font-size:${0.8+Math.random()*1.1}rem;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3.5}s`;
    wrap.appendChild(s);
  }
}

// 花火
function launchConfetti() {
  const colors = ["#FFD93D","#FF6B6B","#6BCB77","#4D96FF","#C77DFF","#FF9ECD"];
  for (let i = 0; i < 40; i++) {
    const p = document.createElement("div");
    const size = 8+Math.random()*10;
    p.style.cssText=`position:fixed;left:${Math.random()*100}%;top:-10px;width:${size}px;height:${size}px;border-radius:${Math.random()>.5?"50%":"3px"};background:${colors[Math.floor(Math.random()*colors.length)]};animation:cf ${1+Math.random()*1.2}s ${Math.random()*.6}s linear forwards;z-index:200;pointer-events:none`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 2500);
  }
}

document.getElementById("modalBg").addEventListener("click", e => { if (e.target===e.currentTarget) closeModal(); });

buildBubbles();
buildSparkles();
updateStarUI();
refresh();
</script>
