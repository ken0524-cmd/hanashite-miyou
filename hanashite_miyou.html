<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>はなしてみよう！</title>
<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
<style>
  :root {
    --sky:#e8f4fd; --yellow:#FFD93D; --orange:#FF6B6B;
    --green:#6BCB77; --blue:#4D96FF; --purple:#C77DFF;
    --pink:#FF9ECD; --dark:#3a3a5c; --shadow:rgba(77,150,255,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--sky);font-family:'Kosugi Maru',sans-serif;min-height:100vh;overflow-x:hidden;padding-bottom:2rem}

  /* BG */
  .bg-stars{position:fixed;inset:0;pointer-events:none;z-index:0}
  .star{position:absolute;border-radius:50%;opacity:.35;animation:floatUp linear infinite}
  @keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:.35}50%{opacity:.55}100%{transform:translateY(-120vh) scale(.6);opacity:0}}

  /* HEADER */
  header{position:relative;z-index:1;text-align:center;padding:1.4rem 1rem .2rem}
  .title-char{font-size:clamp(1.8rem,6vw,2.8rem);font-weight:900;display:inline-block;animation:titleBounce 2s ease-in-out infinite;text-shadow:3px 3px 0 rgba(0,0,0,.12)}
  .title-char:nth-child(1){color:var(--orange);animation-delay:0s}
  .title-char:nth-child(2){color:var(--yellow);animation-delay:.1s}
  .title-char:nth-child(3){color:var(--green);animation-delay:.2s}
  .title-char:nth-child(4){color:var(--blue);animation-delay:.3s}
  .title-char:nth-child(5){color:var(--purple);animation-delay:.4s}
  .title-char:nth-child(6){color:var(--pink);animation-delay:.5s}
  .title-char:nth-child(7){color:var(--orange);animation-delay:.6s}
  .title-char:nth-child(8){color:var(--yellow);animation-delay:.7s}
  @keyframes titleBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .subtitle{font-size:.83rem;color:#7a8eab;margin-top:.2rem;letter-spacing:.1em}

  /* MASCOT */
  .mascot-wrap{position:relative;z-index:1;display:flex;justify-content:center;margin:.3rem 0 0}
  .mascot{position:relative;width:110px;height:110px}
  .mascot-body{width:90px;height:90px;background:var(--yellow);border-radius:50%;position:absolute;bottom:0;left:50%;transform:translateX(-50%);box-shadow:0 6px 0 #e0b800,0 8px 20px rgba(255,217,61,.4);animation:mascotBob 2.5s ease-in-out infinite}
  @keyframes mascotBob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-8px)}}
  .mascot-eye{position:absolute;background:var(--dark);border-radius:50%}
  .eye-l{width:12px;height:14px;top:28px;left:20px}.eye-r{width:12px;height:14px;top:28px;right:20px}
  .mascot-shine{position:absolute;width:4px;height:4px;background:white;border-radius:50%;top:3px;left:2px}
  .mascot-mouth{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:36px;height:18px;border-radius:0 0 18px 18px;background:var(--orange);overflow:hidden;transition:all .3s}
  .mascot-mouth.talking{animation:mouthTalk .3s ease-in-out infinite alternate}
  @keyframes mouthTalk{from{height:10px}to{height:24px}}
  .mascot-blush{position:absolute;width:14px;height:8px;background:var(--pink);border-radius:50%;opacity:.6}
  .blush-l{bottom:28px;left:10px}.blush-r{bottom:28px;right:10px}
  .mascot-ears{position:absolute;top:4px;left:50%;transform:translateX(-50%);width:90px}
  .ear{position:absolute;width:18px;height:28px;background:var(--yellow);border-radius:50% 50% 0 0;box-shadow:0 -3px 0 #e0b800}
  .ear-l{left:8px;transform:rotate(-15deg)}.ear-r{right:8px;transform:rotate(15deg)}
  .bubble{position:absolute;top:0;right:-72px;background:white;border-radius:16px 16px 16px 4px;padding:6px 12px;font-size:.78rem;color:var(--dark);box-shadow:0 4px 12px var(--shadow);white-space:nowrap;transition:all .3s}

  /* MAIN */
  .main{position:relative;z-index:1;padding:0 1rem;max-width:520px;margin:.7rem auto 0}

  /* CAT TABS */
  .cat-tabs{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;margin-bottom:.8rem}
  .cat-tab{font-family:'Kosugi Maru',sans-serif;font-size:.82rem;padding:.4rem .9rem;border:3px solid transparent;border-radius:50px;cursor:pointer;transition:all .2s;background:white;color:#7a8eab;box-shadow:0 3px 0 #d0dde8}
  .cat-tab:hover{transform:translateY(-2px)}
  .cat-tab.active{color:white;transform:translateY(-2px)}
  .cat-tab[data-cat="どうぶつ"].active{background:var(--green);box-shadow:0 3px 0 #4aa855}
  .cat-tab[data-cat="たべもの"].active{background:var(--orange);box-shadow:0 3px 0 #c94040}
  .cat-tab[data-cat="かぞく"].active{background:var(--pink);box-shadow:0 3px 0 #cc6ea0}
  .cat-tab[data-cat="いろ・かず"].active{background:var(--purple);box-shadow:0 3px 0 #9945d4}
  .cat-tab[data-cat="さぎょう"].active{background:var(--blue);box-shadow:0 3px 0 #2a70e0}
  .cat-tab[data-cat="カスタム"].active{background:var(--dark);box-shadow:0 3px 0 #22224a}

  /* PROMPT */
  .prompt-card{background:white;border-radius:28px;padding:1.4rem 1.5rem 1.1rem;box-shadow:0 8px 0 #c5d8ef,0 12px 30px var(--shadow);text-align:center;margin-bottom:.8rem;position:relative;overflow:hidden}
  .prompt-card::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;background:var(--sky);opacity:.6}
  .prompt-label{font-size:.72rem;color:#a0b0c8;letter-spacing:.2em;margin-bottom:.3rem}
  .prompt-emoji{font-size:3rem;margin-bottom:.3rem;display:block;animation:emojiWiggle 3s ease-in-out infinite}
  @keyframes emojiWiggle{0%,100%{transform:rotate(0)}20%{transform:rotate(-8deg)}40%{transform:rotate(8deg)}60%{transform:rotate(-4deg)}80%{transform:rotate(4deg)}}
  .prompt-text{font-size:clamp(1.4rem,5vw,2rem);color:var(--dark);font-weight:700;line-height:1.6;letter-spacing:.05em}
  .prompt-ruby{font-size:.8rem;color:#a0b0c8}

  /* STATE PANEL */
  .state-panel{border-radius:24px;padding:1rem 1.2rem .9rem;margin-bottom:.8rem;text-align:center;position:relative;overflow:hidden;transition:background .35s,border-color .35s}
  .state-panel.s-wait{background:white;border:4px dashed #c5d8ef}
  .state-panel.s-countdown{background:#fff9e6;border:4px solid var(--yellow);box-shadow:0 0 0 6px rgba(255,217,61,.18)}
  .state-panel.s-go{background:#eafdf2;border:4px solid var(--green);box-shadow:0 0 0 10px rgba(107,203,119,.22),0 8px 0 #4aa855;animation:goGlow 1s ease-in-out infinite alternate}
  .state-panel.s-done{background:#fff0f0;border:4px solid var(--orange);box-shadow:0 8px 0 #c94040}
  @keyframes goGlow{from{box-shadow:0 0 0 8px rgba(107,203,119,.15),0 8px 0 #4aa855}to{box-shadow:0 0 0 20px rgba(107,203,119,.35),0 8px 0 #4aa855}}

  .ring{position:absolute;inset:-4px;border-radius:26px;border:3px solid var(--green);opacity:0;pointer-events:none}
  .s-go .ring{animation:ringPulse 1.6s ease-out infinite}
  .s-go .ring:nth-child(2){animation-delay:.7s}
  @keyframes ringPulse{0%{transform:scale(1);opacity:.65}100%{transform:scale(1.12);opacity:0}}

  .state-icon{font-size:2.5rem;display:block;margin-bottom:.2rem}
  .s-go .state-icon{animation:iconPop .6s ease-in-out infinite alternate}
  @keyframes iconPop{from{transform:scale(1)}to{transform:scale(1.2)}}

  .state-main{font-size:1.25rem;font-weight:700;color:var(--dark);transition:color .3s}
  .s-wait .state-main{color:#b0c4d8}
  .s-countdown .state-main{color:#b08000;font-size:1.55rem}
  .s-go .state-main{color:#1e8a47;font-size:1.65rem}
  .s-done .state-main{color:#c94040}

  .state-sub{font-size:.78rem;margin-top:.2rem;color:#a0b0c8}
  .s-countdown .state-sub{color:#c09000}
  .s-go .state-sub{color:#4aa855;font-size:.84rem}
  .s-done .state-sub{color:#c94040}

  .cd-dots{display:flex;justify-content:center;gap:.6rem;margin-top:.6rem}
  .cd-dot{width:20px;height:20px;border-radius:50%;background:var(--yellow);box-shadow:0 3px 0 #c9a800;transition:background .25s,transform .25s,box-shadow .25s}
  .cd-dot.off{background:#e8dfc0;box-shadow:0 2px 0 #ccc;transform:scale(.65)}

  /* MIC BUTTON */
  .rec-outer{display:flex;flex-direction:column;align-items:center;gap:.5rem;margin-bottom:.8rem}
  .rec-ring{border-radius:50%;padding:6px;transition:background .3s}
  .rec-ring.active-ring{background:rgba(107,203,119,.22);animation:recRing .8s ease-in-out infinite alternate}
  @keyframes recRing{from{background:rgba(107,203,119,.15)}to{background:rgba(107,203,119,.42)}}

  .rec-btn{width:100px;height:100px;border-radius:50%;border:none;cursor:pointer;font-size:2.8rem;display:flex;align-items:center;justify-content:center;transition:all .15s;position:relative}
  .rec-btn.b-wait{background:var(--orange);box-shadow:0 7px 0 #c94040,0 10px 28px rgba(255,107,107,.4)}
  .rec-btn.b-wait:hover{transform:translateY(-3px)}
  .rec-btn.b-wait:active{transform:translateY(4px);box-shadow:0 3px 0 #c94040}
  .rec-btn.b-cd{background:var(--yellow);box-shadow:0 7px 0 #c9a800}
  .rec-btn.b-go{background:var(--green);box-shadow:0 7px 0 #4aa855,0 10px 28px rgba(107,203,119,.5);animation:recPulse .7s ease-in-out infinite}
  @keyframes recPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

  .rec-label{font-size:.92rem;color:#7a8eab;font-weight:700;transition:color .3s}
  .rec-label.go{color:#1e8a47;font-size:1rem}

  .next-btn{font-family:'Kosugi Maru',sans-serif;font-size:.88rem;padding:.6rem 1.8rem;background:white;border:3px solid var(--blue);border-radius:50px;color:var(--blue);cursor:pointer;box-shadow:0 4px 0 #2a70e0;transition:all .15s;font-weight:700}
  .next-btn:hover{transform:translateY(-2px)}
  .next-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #2a70e0}

  /* RESULT */
  .result-card{background:white;border-radius:28px;padding:1.4rem;box-shadow:0 8px 0 #c5d8ef,0 12px 30px var(--shadow);text-align:center;display:none;animation:resultPop .4s cubic-bezier(.34,1.56,.64,1)}
  @keyframes resultPop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
  .result-card.show{display:block}

  .result-heard-label{font-size:.72rem;color:#a0b0c8;letter-spacing:.15em;margin-bottom:.3rem}
  .result-heard-text{font-size:1.2rem;color:var(--dark);background:var(--sky);border-radius:16px;padding:.5rem 1rem;display:inline-block;margin-bottom:.9rem}

  .big-result{font-size:3.2rem;display:block;margin-bottom:.3rem;animation:bigBounce .5s cubic-bezier(.34,1.56,.64,1)}
  @keyframes bigBounce{from{transform:scale(0)}to{transform:scale(1)}}

  .result-msg{font-size:1.2rem;font-weight:700;margin-bottom:.8rem}
  .result-msg.correct{color:#1e8a47}
  .result-msg.wrong{color:#c94040}

  .stars-row{display:flex;justify-content:center;gap:.5rem;margin-bottom:.8rem;font-size:2rem}

  .try-again-btn{font-family:'Kosugi Maru',sans-serif;font-size:.95rem;padding:.7rem 2rem;background:var(--orange);border:none;border-radius:50px;color:white;cursor:pointer;box-shadow:0 5px 0 #c94040;transition:all .15s;font-weight:700;margin-right:.5rem}
  .try-again-btn:hover{transform:translateY(-2px)}
  .try-again-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #c94040}

  .next-word-btn{font-family:'Kosugi Maru',sans-serif;font-size:.95rem;padding:.7rem 2rem;background:var(--blue);border:none;border-radius:50px;color:white;cursor:pointer;box-shadow:0 5px 0 #2a70e0;transition:all .15s;font-weight:700}
  .next-word-btn:hover{transform:translateY(-2px)}
  .next-word-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #2a70e0}

  /* NO SUPPORT */
  .no-support{background:#fff3cd;border:2px solid var(--yellow);border-radius:16px;padding:1rem;text-align:center;font-size:.85rem;color:#856404;display:none;margin-bottom:.8rem}

  /* CONFETTI */
  .confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:100;display:none}
  .confetti-piece{position:absolute;width:12px;height:12px;border-radius:2px;animation:confettiFall linear forwards}
  @keyframes confettiFall{
    0%{transform:translateY(-20px) rotate(0deg);opacity:1}
    100%{transform:translateY(100vh) rotate(720deg);opacity:0}
  }
</style>
</head>
<body>

<!-- 背景の星 -->
<div class="bg-stars" id="bgStars"></div>

<!-- CONFETTI -->
<div class="confetti-wrap" id="confettiWrap"></div>

<!-- ヘッダー -->
<header>
  <div>
    <span class="title-char">は</span><span class="title-char">な</span><span class="title-char">し</span><span class="title-char">て</span><span class="title-char">み</span><span class="title-char">よ</span><span class="title-char">う</span><span class="title-char">！</span>
  </div>
  <div class="subtitle">ことばをれんしゅうしよう 🎤</div>
</header>

<!-- マスコット -->
<div class="mascot-wrap">
  <div class="mascot">
    <div class="mascot-ears">
      <div class="ear ear-l"></div>
      <div class="ear ear-r"></div>
    </div>
    <div class="mascot-body">
      <div class="mascot-eye eye-l"><div class="mascot-shine"></div></div>
      <div class="mascot-eye eye-r"><div class="mascot-shine"></div></div>
      <div class="mascot-blush blush-l"></div>
      <div class="mascot-blush blush-r"></div>
      <div class="mascot-mouth" id="mascotMouth"></div>
    </div>
  </div>
  <div class="bubble" id="mascotBubble">いっしょにれんしゅうしよう！</div>
</div>

<!-- メイン -->
<div class="main">

  <!-- 音声認識非対応メッセージ -->
  <div class="no-support" id="noSupport">
    ⚠️ このブラウザは音声認識に対応していません。<br>Chrome か Edge をつかってね。
  </div>

  <!-- カテゴリタブ -->
  <div class="cat-tabs">
    <button class="cat-tab active" data-cat="どうぶつ">🐾 どうぶつ</button>
    <button class="cat-tab" data-cat="たべもの">🍎 たべもの</button>
    <button class="cat-tab" data-cat="かぞく">👨‍👩‍👧 かぞく</button>
    <button class="cat-tab" data-cat="いろ・かず">🎨 いろ・かず</button>
    <button class="cat-tab" data-cat="さぎょう">🧹 さぎょう</button>
    <button class="cat-tab" data-cat="カスタム">✏️ じぶんで</button>
  </div>

  <!-- カスタム単語追加パネル -->
  <div id="customPanel" style="display:none;background:white;border-radius:24px;padding:1rem 1.2rem;box-shadow:0 6px 0 #c5d8ef;margin-bottom:.8rem">
    <div style="font-size:.78rem;color:#a0b0c8;letter-spacing:.1em;margin-bottom:.6rem">▼ ことばをついかしよう</div>
    <div style="display:flex;gap:.5rem;margin-bottom:.5rem;flex-wrap:wrap">
      <input id="customEmoji" type="text" placeholder="😊" maxlength="2"
        style="width:54px;font-size:1.4rem;text-align:center;border:3px solid #c5d8ef;border-radius:14px;padding:.3rem;font-family:Kosugi Maru,sans-serif;outline:none">
      <input id="customWord" type="text" placeholder="ことばをにゅうりょく"
        style="flex:1;min-width:120px;font-size:1rem;border:3px solid #c5d8ef;border-radius:14px;padding:.3rem .7rem;font-family:Kosugi Maru,sans-serif;outline:none">
      <button onclick="addCustomWord()"
        style="font-family:Kosugi Maru,sans-serif;background:var(--blue);color:white;border:none;border-radius:14px;padding:.3rem .9rem;font-size:.9rem;cursor:pointer;box-shadow:0 3px 0 #2a70e0;font-weight:700">ついか</button>
    </div>
    <div id="customList" style="display:flex;flex-wrap:wrap;gap:.4rem;min-height:28px"></div>
  </div>

  <!-- お題カード -->
  <div class="prompt-card">
    <div class="prompt-label">▼ これをいってみよう！</div>
    <span class="prompt-emoji" id="promptEmoji">🐶</span>
    <div class="prompt-text" id="promptText">いぬ</div>
    <div class="prompt-ruby" id="promptRuby"></div>
  </div>

  <!-- 状態パネル -->
  <div class="state-panel s-wait" id="statePanel">
    <div class="ring"></div><div class="ring"></div>
    <span class="state-icon" id="stateIcon">🎤</span>
    <div class="state-main" id="stateMain">ボタンをおしてね</div>
    <div class="state-sub" id="stateSub">マイクがひつようです</div>
    <div class="cd-dots" id="cdDots" style="display:none">
      <div class="cd-dot" id="dot0"></div>
      <div class="cd-dot" id="dot1"></div>
      <div class="cd-dot" id="dot2"></div>
    </div>
  </div>

  <!-- マイクボタン -->
  <div class="rec-outer">
    <div class="rec-ring" id="recRing">
      <button class="rec-btn b-wait" id="recBtn" onclick="handleRecBtn()">🎤</button>
    </div>
    <div class="rec-label" id="recLabel">おしてはなす</div>
    <button class="next-btn" id="nextBtn" onclick="nextPrompt()">➡️ つぎのことば</button>
  </div>

  <!-- 結果カード -->
  <div class="result-card" id="resultCard">
    <div class="result-heard-label">▼ きこえたことば</div>
    <div class="result-heard-text" id="heardText">—</div>
    <span class="big-result" id="bigResult">🎉</span>
    <div class="result-msg" id="resultMsg">すごい！</div>
    <div class="stars-row" id="starsRow">⭐⭐⭐</div>
    <div style="display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap">
      <button class="try-again-btn" onclick="tryAgain()">🔄 もういちど</button>
      <button class="next-word-btn" onclick="nextPrompt()">➡️ つぎのことば</button>
    </div>
  </div>

</div><!-- /main -->

<script>
// =====================
// データ
// =====================
const PROMPTS = {
  "どうぶつ": [
    {emoji:"🐶", text:"いぬ",       keys:["いぬ","犬"]},
    {emoji:"🐱", text:"ねこ",       keys:["ねこ","猫"]},
    {emoji:"🐭", text:"ねずみ",     keys:["ねずみ","鼠"]},
    {emoji:"🐰", text:"うさぎ",     keys:["うさぎ","兎"]},
    {emoji:"🐻", text:"くま",       keys:["くま","熊"]},
    {emoji:"🐘", text:"ぞう",       keys:["ぞう","象"]},
    {emoji:"🦁", text:"らいおん",   keys:["らいおん","ライオン"]},
    {emoji:"🐸", text:"かえる",     keys:["かえる","蛙"]},
    {emoji:"🐧", text:"ぺんぎん",   keys:["ぺんぎん","ペンギン"]},
    {emoji:"🦊", text:"きつね",     keys:["きつね","狐"]},
  ],
  "たべもの": [
    {emoji:"🍎", text:"りんご",     keys:["りんご","林檎"]},
    {emoji:"🍌", text:"ばなな",     keys:["ばなな","バナナ"]},
    {emoji:"🍙", text:"おにぎり",   keys:["おにぎり"]},
    {emoji:"🍜", text:"らーめん",   keys:["らーめん","ラーメン","拉麺"]},
    {emoji:"🍰", text:"けーき",     keys:["けーき","ケーキ"]},
    {emoji:"🍓", text:"いちご",     keys:["いちご","苺"]},
    {emoji:"🥕", text:"にんじん",   keys:["にんじん","人参"]},
    {emoji:"🍙", text:"おにぎり",   keys:["おにぎり"]},
    {emoji:"🍦", text:"あいすくりーむ",keys:["あいすくりーむ","アイスクリーム","アイス"]},
    {emoji:"🍞", text:"ぱん",       keys:["ぱん","パン"]},
  ],
  "かぞく": [
    {emoji:"👦", text:"おとこのこ", keys:["おとこのこ","男の子"]},
    {emoji:"👧", text:"おんなのこ", keys:["おんなのこ","女の子"]},
    {emoji:"👨", text:"おとうさん", keys:["おとうさん","お父さん","父"]},
    {emoji:"👩", text:"おかあさん", keys:["おかあさん","お母さん","母"]},
    {emoji:"👴", text:"おじいさん", keys:["おじいさん","お爺さん","祖父"]},
    {emoji:"👵", text:"おばあさん", keys:["おばあさん","お婆さん","祖母"]},
    {emoji:"👶", text:"あかちゃん", keys:["あかちゃん","赤ちゃん"]},
    {emoji:"🧒", text:"こども",     keys:["こども","子供","子ども"]},
    {emoji:"👫", text:"ともだち",   keys:["ともだち","友達","友だち"]},
    {emoji:"🏠", text:"おうち",     keys:["おうち","家","いえ"]},
  ],
  "いろ・かず": [
    {emoji:"🔴", text:"あか",       keys:["あか","赤"]},
    {emoji:"🔵", text:"あお",       keys:["あお","青"]},
    {emoji:"🟡", text:"きいろ",     keys:["きいろ","黄色","黄"]},
    {emoji:"🟢", text:"みどり",     keys:["みどり","緑"]},
    {emoji:"⚫", text:"くろ",       keys:["くろ","黒"]},
    {emoji:"⚪", text:"しろ",       keys:["しろ","白"]},
    {emoji:"1️⃣", text:"いち",       keys:["いち","一","1"]},
    {emoji:"2️⃣", text:"に",         keys:["に","二","2"]},
    {emoji:"3️⃣", text:"さん",       keys:["さん","三","3"]},
    {emoji:"4️⃣", text:"し・よん",   keys:["し","よん","四","4"]},
    {emoji:"5️⃣", text:"ご",         keys:["ご","五","5"]},
  ],
  "さぎょう": [
    {emoji:"🙌", text:"てをあらう",     keys:["てをあらう","手を洗う","手洗い"]},
    {emoji:"🦷", text:"はをみがく",     keys:["はをみがく","歯を磨く","歯磨き"]},
    {emoji:"👕", text:"きがえる",       keys:["きがえる","着替える","着替え"]},
    {emoji:"🛏️", text:"ねる",           keys:["ねる","寝る"]},
    {emoji:"🪑", text:"すわる",         keys:["すわる","座る"]},
    {emoji:"🧹", text:"そうじする",     keys:["そうじする","掃除する","掃除"]},
    {emoji:"🎒", text:"かばんをもつ",   keys:["かばんをもつ","鞄を持つ"]},
    {emoji:"🥄", text:"たべる",         keys:["たべる","食べる"]},
    {emoji:"🥤", text:"のむ",           keys:["のむ","飲む"]},
    {emoji:"🚶", text:"あるく",         keys:["あるく","歩く"]},
  ],
  "カスタム": [],
};

// =====================
// 状態
// =====================
let currentCat = "どうぶつ";
let currentIndex = 0;
let state = "wait"; // wait | countdown | go | done
let recognition = null;
let cdTimer = null;
let recTimer = null;
let lastHeard = "";
let speechSynth = window.speechSynthesis;

// =====================
// 初期化
// =====================
function init() {
  buildBgStars();
  checkSpeechSupport();
  setupTabs();
  shuffle(PROMPTS["どうぶつ"]);
  showPrompt();
}

function checkSpeechSupport() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById("noSupport").style.display = "block";
    document.getElementById("recBtn").disabled = true;
    document.getElementById("recBtn").style.opacity = ".4";
  } else {
    setupRecognition();
  }
}

function setupRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = "ja-JP";
  recognition.continuous = true;      // 即終了を防ぐ
  recognition.interimResults = true;  // 途中結果も受け取る
  recognition.maxAlternatives = 5;

  recognition.onresult = (e) => {
    // 最終結果（isFinal）のみ判定に使う
    const result = e.results[e.results.length - 1];
    if (!result.isFinal) return; // 途中結果は無視

    const prompt = currentPrompt();
    let heard = "";
    for (let i = 0; i < result.length; i++) {
      const candidate = result[i].transcript.trim().toLowerCase();
      if (isMatch(candidate, prompt.keys)) {
        heard = candidate;
        break;
      }
    }
    if (!heard) heard = result[0].transcript.trim();
    lastHeard = heard;
    finishRecording(heard);
  };

  recognition.onerror = (e) => {
    if (e.error === "no-speech" || e.error === "audio-capture") {
      finishRecording("");
    } else if (e.error !== "aborted") {
      finishRecording("");
    }
  };

  recognition.onend = () => {
    if (state === "go") {
      // 録音が自然終了した場合（結果未受信）
    }
  };
}

// =====================
// カテゴリ
// =====================
function setupTabs() {
  document.querySelectorAll(".cat-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".cat-tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      currentCat = tab.dataset.cat;
      if (currentCat !== "カスタム") shuffle(PROMPTS[currentCat]);
      currentIndex = 0;
      resetState();
      document.getElementById("customPanel").style.display = currentCat === "カスタム" ? "block" : "none";
      showPrompt();
    });
  });
}

// =====================
// お題
// =====================
function currentPrompt() {
  const list = PROMPTS[currentCat];
  return list[currentIndex % list.length];
}

function showPrompt() {
  if (currentCat === "カスタム" && PROMPTS["カスタム"].length === 0) {
    document.getElementById("promptEmoji").textContent = "✏️";
    document.getElementById("promptText").textContent = "ことばをついかしてね";
    document.getElementById("resultCard").classList.remove("show");
    resetState();
    setBubble("ことばをついかしてね！");
    return;
  }
  const p = currentPrompt();
  document.getElementById("promptEmoji").textContent = p.emoji;
  document.getElementById("promptText").textContent = p.text;
  document.getElementById("resultCard").classList.remove("show");
  resetState();
  setBubble("いっしょにれんしゅうしよう！");
}

function nextPrompt() {
  currentIndex++;
  if (currentIndex >= PROMPTS[currentCat].length) {
    shuffle(PROMPTS[currentCat]);
    currentIndex = 0;
  }
  showPrompt();
}

// =====================
// 録音フロー
// =====================
function handleRecBtn() {
  if (state === "wait") {
    startCountdown();
  } else if (state === "go") {
    stopRecording();
  }
}

function startCountdown() {
  setState("countdown");
  setBubble("じゅんびして！");

  const dots = [document.getElementById("dot0"), document.getElementById("dot1"), document.getElementById("dot2")];
  dots.forEach(d => d.classList.remove("off"));
  document.getElementById("cdDots").style.display = "flex";

  let count = 3;
  updateCountdown(count);
  dots.forEach(d => d.classList.add("off"));

  // 3→2→1
  const steps = [
    () => { count=3; updateCountdown(3); dots[0].classList.remove("off"); dots[1].classList.add("off"); dots[2].classList.add("off"); },
    () => { count=2; updateCountdown(2); dots[0].classList.remove("off"); dots[1].classList.remove("off"); dots[2].classList.add("off"); },
    () => { count=1; updateCountdown(1); dots[0].classList.remove("off"); dots[1].classList.remove("off"); dots[2].classList.remove("off"); },
    () => { startListening(); }
  ];

  let step = 0;
  steps[step](); step++;
  cdTimer = setInterval(() => {
    if (step < steps.length) { steps[step](); step++; }
    else clearInterval(cdTimer);
  }, 800);
}

function updateCountdown(n) {
  document.getElementById("stateMain").textContent = `${n}…`;
  document.getElementById("stateSub").textContent = "もうすこし！";
}

function startListening() {
  clearInterval(cdTimer);
  setState("go");
  document.getElementById("cdDots").style.display = "none";
  setBubble("はなしてね！🎤");

  // recognition を毎回新しく作り直す（使い回しによるバグを防ぐ）
  setupRecognition();

  if (recognition) {
    try { recognition.start(); } catch(e) { console.warn(e); }
  }

  // 最大8秒で自動停止
  recTimer = setTimeout(() => {
    if (state === "go") stopRecording();
  }, 8000);
}

function stopRecording() {
  clearTimeout(recTimer);
  if (state !== "go") return;
  if (recognition) {
    try { recognition.stop(); } catch(e) {}
  }
  // onresult が来ない場合の保険（1秒待って結果がなければ空で終了）
  setTimeout(() => {
    if (state === "go") finishRecording(lastHeard || "");
  }, 1000);
}

function finishRecording(heard) {
  setState("done");
  clearTimeout(recTimer);
  lastHeard = "";

  const prompt = currentPrompt();
  const matched = isMatch(heard, prompt.keys);

  showResult(heard, matched);
  speakFeedback(matched, prompt.text);
}

// =====================
// 正誤判定
// =====================
function isMatch(heard, keys) {
  if (!heard) return false;
  const h = heard.replace(/\s/g, "").toLowerCase();
  return keys.some(k => {
    const kk = k.toLowerCase();
    return h.includes(kk) || kk.includes(h);
  });
}

// =====================
// 結果表示
// =====================
function showResult(heard, correct) {
  const card = document.getElementById("resultCard");
  const heardEl = document.getElementById("heardText");
  const bigEl = document.getElementById("bigResult");
  const msgEl = document.getElementById("resultMsg");
  const starsEl = document.getElementById("starsRow");

  heardEl.textContent = heard ? heard : "（きこえなかった…）";

  if (correct) {
    bigEl.textContent = "🎉";
    msgEl.textContent = "すごい！ よくできました！";
    msgEl.className = "result-msg correct";
    starsEl.textContent = "⭐⭐⭐";
    setBubble("やったね！！🎊");
    showConfetti();
  } else if (heard) {
    bigEl.textContent = "😊";
    msgEl.textContent = "もういちどチャレンジしてみよう！";
    msgEl.className = "result-msg wrong";
    starsEl.textContent = "⭐";
    setBubble("がんばって！");
  } else {
    bigEl.textContent = "🎤";
    msgEl.textContent = "こえがきこえなかったよ。もういちど！";
    msgEl.className = "result-msg wrong";
    starsEl.textContent = "";
    setBubble("もういちどはなしてね！");
  }

  card.classList.add("show");
}

// =====================
// 音声フィードバック（TTS）
// =====================
function speakFeedback(correct, word) {
  if (!speechSynth) return;
  speechSynth.cancel();

  const mouth = document.getElementById("mascotMouth");
  mouth.classList.add("talking");

  let text = correct
    ? `${word}！ よくできました！ すごいね！`
    : `もういちど、${word}、といってみよう！`;

  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = "ja-JP";
  utt.rate = 0.85;
  utt.pitch = 1.3;

  utt.onend = () => { mouth.classList.remove("talking"); };
  utt.onerror = () => { mouth.classList.remove("talking"); };

  speechSynth.speak(utt);
}

// =====================
// もういちど
// =====================
function tryAgain() {
  document.getElementById("resultCard").classList.remove("show");
  resetState();
  setBubble("いっしょにれんしゅうしよう！");
}

// =====================
// 状態管理
// =====================
function setState(s) {
  state = s;
  const panel = document.getElementById("statePanel");
  const btn = document.getElementById("recBtn");
  const ring = document.getElementById("recRing");
  const label = document.getElementById("recLabel");
  const icon = document.getElementById("stateIcon");
  const main = document.getElementById("stateMain");
  const sub = document.getElementById("stateSub");

  panel.className = "state-panel s-" + s;

  if (s === "wait") {
    icon.textContent = "🎤";
    main.textContent = "ボタンをおしてね";
    sub.textContent = "マイクがひつようです";
    btn.className = "rec-btn b-wait";
    btn.textContent = "🎤";
    ring.classList.remove("active-ring");
    label.textContent = "おしてはなす";
    label.className = "rec-label";
  } else if (s === "countdown") {
    icon.textContent = "⏳";
    sub.textContent = "もうすこし！";
    btn.className = "rec-btn b-cd";
    btn.textContent = "⏳";
    ring.classList.remove("active-ring");
    label.textContent = "じゅんびちゅう…";
    label.className = "rec-label";
  } else if (s === "go") {
    icon.textContent = "🎙️";
    main.textContent = "いまはなしてね！";
    sub.textContent = "きいているよ👂";
    btn.className = "rec-btn b-go";
    btn.textContent = "⏹️";
    ring.classList.add("active-ring");
    label.textContent = "はなしてね！";
    label.className = "rec-label go";
  } else if (s === "done") {
    icon.textContent = "✅";
    main.textContent = "きろく おわり！";
    sub.textContent = "けっかをみてね";
    btn.className = "rec-btn b-wait";
    btn.textContent = "🎤";
    ring.classList.remove("active-ring");
    label.textContent = "おしてはなす";
    label.className = "rec-label";
  }
}

function resetState() {
  clearInterval(cdTimer);
  clearTimeout(recTimer);
  if (recognition) { try { recognition.abort(); } catch(e) {} }
  setState("wait");
  document.getElementById("cdDots").style.display = "none";
}

// =====================
// マスコット吹き出し
// =====================
function setBubble(text) {
  document.getElementById("mascotBubble").textContent = text;
}

// =====================
// 背景の星
// =====================
function buildBgStars() {
  const wrap = document.getElementById("bgStars");
  const colors = ["#FFD93D","#FF6B6B","#6BCB77","#4D96FF","#C77DFF","#FF9ECD"];
  for (let i = 0; i < 28; i++) {
    const s = document.createElement("div");
    s.className = "star";
    const size = 6 + Math.random() * 14;
    s.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${6+Math.random()*10}s;
      animation-delay:${-Math.random()*10}s;
    `;
    wrap.appendChild(s);
  }
}

// =====================
// コンフェッティ
// =====================
function showConfetti() {
  const wrap = document.getElementById("confettiWrap");
  wrap.style.display = "block";
  wrap.innerHTML = "";
  const colors = ["#FFD93D","#FF6B6B","#6BCB77","#4D96FF","#C77DFF","#FF9ECD"];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement("div");
    p.className = "confetti-piece";
    p.style.cssText = `
      left:${Math.random()*100}%;
      top:-20px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${1.2+Math.random()*1.5}s;
      animation-delay:${Math.random()*.8}s;
      transform:rotate(${Math.random()*360}deg);
      border-radius:${Math.random()>0.5?"50%":"2px"};
    `;
    wrap.appendChild(p);
  }
  setTimeout(() => { wrap.style.display = "none"; }, 3000);
}

// =====================
// ユーティリティ
// =====================
function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// =====================
// カスタム単語追加
// =====================
function addCustomWord() {
  const emojiEl = document.getElementById("customEmoji");
  const wordEl = document.getElementById("customWord");
  const emoji = emojiEl.value.trim() || "📝";
  const word = wordEl.value.trim();
  if (!word) { wordEl.focus(); return; }

  const entry = {emoji: emoji, text: word, keys: [word]};
  PROMPTS["カスタム"].push(entry);

  // タグ表示
  const tag = document.createElement("div");
  tag.style.cssText = "background:var(--sky);border-radius:20px;padding:.25rem .7rem;font-size:.82rem;color:var(--dark);display:flex;align-items:center;gap:.3rem;cursor:default";
  tag.innerHTML = `${emoji} ${word} <span onclick="removeCustomWord(this, this.dataset.word)" data-word="${word}" style="cursor:pointer;color:#c94040;font-weight:700;margin-left:2px">✕</span>`;
  document.getElementById("customList").appendChild(tag);

  emojiEl.value = "";
  wordEl.value = "";
  wordEl.focus();

  // 今カスタムタブを表示中なら即反映
  if (currentCat === "カスタム") { currentIndex = PROMPTS["カスタム"].length - 1; showPrompt(); }
}

function removeCustomWord(el) {
  const word = el.dataset.word;
  PROMPTS["カスタム"] = PROMPTS["カスタム"].filter(p => p.text !== word);
  el.parentElement.remove();
  if (currentCat === "カスタム") { currentIndex = 0; showPrompt(); }
}

// =====================
// 起動
// =====================
init();
</script>
